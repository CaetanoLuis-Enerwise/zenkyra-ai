services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: zenkyra
      POSTGRES_PASSWORD: zenkyra
      POSTGRES_DB: zenkyra
    ports:
      - "5432:5432"
    volumes:
      - zenkyra_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zenkyra"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  qdrant:
    image: qdrant/qdrant:v1.12.4
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - zenkyra_qdrant:/qdrant/storage

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://zenkyra:zenkyra@postgres:5432/zenkyra
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      STORAGE_PATH: /app/storage
    volumes:
      - zenkyra_storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      qdrant:
        condition: service_started

volumes:
  zenkyra_pg:
  zenkyra_qdrant:
  zenkyra_storage:
